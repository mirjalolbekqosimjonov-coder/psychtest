<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS-14 — Stress Testi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; }
        .progress { text-align: center; font-size: 1.1rem; margin: 10px 0; font-weight: 600; }
        .question {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .options button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.95);
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .options button:hover { background: #3498db; color: white; }
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .nav-buttons button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
        .finish-btn { background: #27ae60; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PSS-14 — Stress darajasi</h1>
            <div class="progress" id="progress">Savol 1 / 14</div>
        </div>

        <div class="question" id="question-container">
            <p id="question-text" style="font-size:1.1rem; line-height:1.5;"></p>
            <div class="options" id="options"></div>
        </div>

        <div class="nav-buttons">
            <button onclick="prevQuestion()" id="prevBtn">← Oldingi</button>
            <button onclick="nextQuestion()" id="nextBtn">Keyingi →</button>
        </div>
    </div>

    <script>
        const questions = [
            "O'tgan oyda kutilmagan voqea sizni qanchalik xafa qildi?",
            "O'tgan oyda muhim narsalarni boshqara olmayotganingizni his qildingizmi?",
            "O'tgan oyda asabiy va stressli his qildingizmi?",
            "O'tgan oyda shaxsiy muammolaringizni hal qilishga qanchalik ishondingiz?",
            "O'tgan oyda hamma narsa istagan yo'lingizda ketyapti deb his qildingizmi?",
            "O'tgan oyda barcha ishlarni uddalay olmayotganingizni his qildingizmi?",
            "O'tgan oyda g'azablantiruvchi vaziyatlarni qanchalik boshqara oldingiz?",
            "O'tgan oyda vaziyat ustida ekaningizni his qildingizmi?",
            "O'tgan oyda nazoratdan tashqari narsalar sizni g'azablantirdimi?",
            "O'tgan oyda qiyinchiliklarni yengib o'ta olmayman deb his qildingizmi?",
            "O'tgan oyda bajarish kerak bo'lgan ishlar haqida tez-tez o'ylab qoldingizmi?",
            "O'tgan oyda vaqtingizni boshqarishda qanchalik muvaffaqiyatli bo'ldingiz?",
            "O'tgan oyda muhim o'zgarishlarni samarali boshqarayotganingizni his qildingizmi?",
            "O'tgan oyda hayotingiz ustida to'liq nazoratda ekaningizni his qildingizmi?"
        ];

        let current = 0;
        let scores = new Array(14).fill(null); // null = javob berilmagan

        function showQuestion() {
            document.getElementById("progress").textContent = `Savol ${current + 1} / 14`;
            document.getElementById("question-text").textContent = questions[current];

            let html = "";
            const answers = ["Hech qachon", "Kamdan-kam", "Ba'zan", "Ko'pincha", "Doim"];
            for (let i = 0; i < 5; i++) {
                const selected = scores[current] === i ? "style='background:#3498db;color:white;'" : "";
                html += `<button ${selected} onclick="selectAnswer(${i})">${answers[i]}</button>`;
            }
            document.getElementById("options").innerHTML = html;

            document.getElementById("prevBtn").style.display = current === 0 ? "none" : "inline-block";
            document.getElementById("nextBtn").style.display = current === 13 ? "none" : "inline-block";
        }

        function selectAnswer(value) {
            scores[current] = value;
            showQuestion(); // tanlangan javobni belgilab turadi
        }

        function prevQuestion() {
            if (current > 0) {
                current--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (scores[current] === null) {
                alert("Iltimos, savolga javob bering!");
                return;
            }
            if (current < 13) {
                current++;
                showQuestion();
            }
        }

        function finishTest() {
            // Javob berilmagan savollar bor-yo‘qligini tekshirish
            if (scores.includes(null)) {
                alert("Iltimos, barcha savollarga javob bering!");
                return;
            }

            let total = scores.reduce((a, b) => a + b, 0);
            let level = "";
            let advice = "";

            if (total <= 18) {
                level = "🟢 Past stress darajasi";
                advice = "Siz nisbatan xotirjam holatdasiz. Hozirgi tarzingizni saqlang.";
            } else if (total <= 37) {
                level = "🟡 O'rtacha stress darajasi";
                advice = "Stress darajangiz o'rtacha. Nafas mashqlari va dam olishni ko'paytiring.";
            } else {
                level = "🔴 Yuqori stress darajasi";
                advice = "Stress darajangiz yuqori. Psixolog bilan maslahatlashishni tavsiya qilamiz.";
            }

            document.getElementById("question-container").innerHTML = `
                <h2>Test tugadi!</h2>
                <h3>Jami ball: <b>${total} / 56</b></h3>
                <h3>${level}</h3>
                <p><strong>Tavsiya:</strong> ${advice}</p>
                <button class="finish-btn" onclick="window.location.href='index.html'">Bosh sahifaga qaytish</button>
            `;
        }

        // Testni boshlash
        showQuestion();
    </script>
</body>
</html>
