<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS-14 — Stress Testi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .question {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .options button {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .progress {
            text-align: center;
            margin: 15px 0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PSS-14 — Stress darajasi</h1>
        <div class="progress" id="progress">Savol 1 / 14</div>
        
        <div class="question" id="question-container">
            <p id="question-text"></p>
            <div class="options" id="options"></div>
        </div>
    </div>

    <script>
        const questions = [
            "O'tgan oyda kutilmagan voqea sizni qanchalik xafa qildi?",
            "O'tgan oyda muhim narsalarni boshqara olmayotganingizni his qildingizmi?",
            "O'tgan oyda asabiy va stressli his qildingizmi?",
            "O'tgan oyda shaxsiy muammolaringizni hal qilishga qanchalik ishondingiz?",
            "O'tgan oyda hamma narsa istagan yo'lingizda ketyapti deb his qildingizmi?",
            "O'tgan oyda barcha ishlarni uddalay olmayotganingizni his qildingizmi?",
            "O'tgan oyda g'azablantiruvchi vaziyatlarni qanchalik boshqara oldingiz?",
            "O'tgan oyda vaziyat ustida ekaningizni his qildingizmi?",
            "O'tgan oyda nazoratdan tashqari narsalar sizni g'azablantirdimi?",
            "O'tgan oyda qiyinchiliklarni yengib o'ta olmayman deb his qildingizmi?",
            "O'tgan oyda bajarish kerak bo'lgan ishlar haqida tez-tez o'ylab qoldingizmi?",
            "O'tgan oyda vaqtingizni boshqarishda qanchalik muvaffaqiyatli bo'ldingiz?",
            "O'tgan oyda muhim o'zgarishlarni samarali boshqarayotganingizni his qildingizmi?",
            "O'tgan oyda hayotingiz ustida to'liq nazoratda ekaningizni his qildingizmi?"
        ];

        let currentQuestion = 0;
        let scores = [];

        function showQuestion() {
            document.getElementById("progress").textContent = `Savol ${currentQuestion + 1} / 14`;
            document.getElementById("question-text").textContent = questions[currentQuestion];
            
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = `
                <button onclick="answer(0)">Hech qachon</button>
                <button onclick="answer(1)">Kamdan-kam</button>
                <button onclick="answer(2)">Ba'zan</button>
                <button onclick="answer(3)">Ko'pincha</button>
                <button onclick="answer(4)">Doim</button>
            `;
        }

        function answer(score) {
            scores.push(score);
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                finishTest();
            }
        }

        function finishTest() {
            let total = scores.reduce((a, b) => a + b, 0);
            let result = "";
            
            if (total <= 18) result = "🟢 Past stress darajasi";
            else if (total <= 37) result = "🟡 O'rtacha stress darajasi";
            else result = "🔴 Yuqori stress darajasi";

            document.getElementById("question-container").innerHTML = `
                <h2>Test tugadi!</h2>
                <h3>Jami ball: ${total} / 56</h3>
                <p><strong>${result}</strong></p>
                <button onclick="window.location.href='index.html'" style="background:#2ecc71;color:white;">Bosh sahifaga qaytish</button>
            `;
        }

        // Testni boshlash
        showQuestion();
    </script>
</body>
</html>
