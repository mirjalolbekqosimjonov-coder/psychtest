<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobotlar - Admin</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1f4e79; color: white; }
        .container { max-width: 1100px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Umumiy Hisobot</h1>
        <button onclick="loadResults()">🔄 Yangilash</button>
        <table id="table">
            <tr>
                <th>Sana</th>
                <th>Ism</th>
                <th>Test</th>
                <th>Ball</th>
                <th>Natija</th>
            </tr>
        </table>
    </div>

    <script>
        async function loadResults() {
            try {
                const res = await fetch('test_results.json');
                const data = await res.json();
                
                let html = `<tr><th>Sana</th><th>Ism</th><th>Test</th><th>Ball</th><th>Natija</th></tr>`;
                data.reverse().forEach(r => {
                    html += `<tr>
                        <td>${r.sana}</td>
                        <td>${r.ism}</td>
                        <td>${r.test}</td>
                        <td><b>${r.ball}</b></td>
                        <td>${r.natija}</td>
                    </tr>`;
                });
                document.getElementById("table").innerHTML = html;
            } catch(e) {
                document.getElementById("table").innerHTML = "<tr><td colspan='5'>Hozircha natijalar yo'q</td></tr>";
            }
        }

        loadResults();
    </script>
</body>
</html>
