<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psixologik Testlar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2.6rem; text-align: center; margin: 40px 0 10px; }
        .subtitle { text-align: center; opacity: 0.9; margin-bottom: 40px; }
        
        .test-card {
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 20px;
            padding: 25px;
            margin: 18px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .pss-btn { background: #3498db; color: white; }
        .mbi-btn { background: #e74c3c; color: white; }
        .pwb-btn { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Psixologik Testlar</h1>
        <p class="subtitle">O'zingizni chuqurroq bilish uchun 3 ta professional test</p>

        <div class="test-card">
            <h2>🌊 PSS-14 — Stress darajasi</h2>
            <p>14 savol • ~3 daqiqa</p>
            <button class="pss-btn" onclick="window.location.href='pss.html'">Testni boshlash</button>
        </div>

        <div class="test-card">
            <h2>🔥 MBI-22 — Kasbiy charchoq</h2>
            <p>22 savol • ~5 daqiqa</p>
            <button class="mbi-btn" onclick="window.location.href='mbi.html'">Testni boshlash</button>
        </div>

        <div class="test-card">
            <h2>🌱 PWB-42 — Psixologik farovonlik</h2>
            <p>42 savol • ~10 daqiqa</p>
            <button class="pwb-btn" onclick="window.location.href='pwb.html'">Testni boshlash</button>
        </div>
    </div>
</body>
</html>
