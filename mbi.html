<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBI-22 — Kasbiy charchoq testi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e74c3c, #8e44ad);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; }
        .progress { text-align: center; font-size: 1.1rem; margin: 10px 0; font-weight: 600; }
        .question {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .options button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.95);
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .options button:hover, .options button.selected { 
            background: #e74c3c; 
            color: white; 
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .nav-buttons button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
        .finish-btn { background: #27ae60; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 MBI-22 — Kasbiy charchoq testi</h1>
            <div class="progress" id="progress">Savol 1 / 22</div>
        </div>

        <div class="question" id="question-container">
            <p id="question-text" style="font-size:1.1rem; line-height:1.5;"></p>
            <div class="options" id="options"></div>
        </div>

        <div class="nav-buttons">
            <button onclick="prevQuestion()" id="prevBtn">← Oldingi</button>
            <button onclick="finishTest()" class="finish-btn">Testni yakunlash</button>
        </div>
    </div>

    <script>
        const questions = [
            "Ishim meni hissiy jihatdan holdan toydiradi.",
            "Ish kunining oxirida o'zimni butunlay tugagan his qilaman.",
            "Ertalab uyg'onganimda yangi ish kuni meni charchatishini his qilaman.",
            "Kun bo'yi odamlar bilan ishlash menga juda og'ir.",
            "Ishim meni ruhan holdan toydiradi.",
            "Ishimda odamlar bilan muloqot qilishdan charchab ketdim.",
            "Ishimda hissiy muammolarni hal qilishda o'zimni ojiz his qilaman.",
            "Ishdan keyin odamlar bilan muloqot qilgim kelmaydi.",
            "Ishda o'zimni oxirigacha berib, hech narsa qolmaganday his qilaman.",
            "Mijozlarim/o'quvchilarim/bemorlarimga munosabatimda sovuqqon bo'lib qolganman.",
            "Ish boshlaganimdan beri odamlarga nisbatan qo'pol bo'lib qolganman deb o'ylayman.",
            "Ishda odamlar bilan ishlash meni haqiqatan ham charchatadi.",
            "Ishimda odamlarga nima bo'lishidan befarq bo'lib qolganman.",
            "Ba'zi muammolarni mijozlarim/o'quvchilarim o'zlariga bog'layapti deb his qilaman.",
            "Ishimda odamlar bilan samarali ishlashim mumkinligini his qilaman.",
            "Ishimda ijobiy ta'sir ko'rsatayotganimni his qilaman.",
            "Ishimda muammolarni oson hal qila olaman.",
            "Ishimda o'zimni energiyaga to'la his qilaman.",
            "Odamlarga yordam berib, hayotlariga ijobiy o'zgarish kiritayotganimni his qilaman.",
            "Ishdan keyin o'zimni muvaffaqiyatli his qilaman.",
            "Men o'z ishimda ko'p narsaga erishdim deb o'ylayman.",
            "Ishimda odamlar bilan ishlash menga quvonch beradi."
        ];

        let current = 0;
        let scores = new Array(22).fill(null);

        function showQuestion() {
            document.getElementById("progress").textContent = `Savol ${current + 1} / 22`;
            document.getElementById("question-text").textContent = questions[current];

            let html = "";
            const answers = ["Hech qachon", "Yiliga bir necha", "Oyda bir marta", "Oyda bir necha", "Haftada bir", "Haftada bir necha", "Har kuni"];
            for (let i = 0; i < 7; i++) {
                const selected = scores[current] === i ? "class='selected'" : "";
                html += `<button ${selected} onclick="selectAnswer(${i})">${answers[i]}</button>`;
            }
            document.getElementById("options").innerHTML = html;

            document.getElementById("prevBtn").style.display = current === 0 ? "none" : "inline-block";
        }

        function selectAnswer(value) {
            scores[current] = value;
            
            if (current < 21) {
                setTimeout(() => {
                    current++;
                    showQuestion();
                }, 350);
            } else {
                setTimeout(finishTest, 400);
            }
        }

        function prevQuestion() {
            if (current > 0) {
                current--;
                showQuestion();
            }
        }

        function finishTest() {
            const unanswered = scores.filter(s => s === null).length;
            
            if (unanswered > 0) {
                if (!confirm(`Siz ${unanswered} ta savolga javob bermadingiz.\nShunga qaramay yakunlamoqchimisiz?`)) {
                    return;
                }
            }

            let hc = scores.slice(0,9).reduce((a,b)=>a+(b||0),0);
            let dp = scores.slice(9,14).reduce((a,b)=>a+(b||0),0);
            let sy = scores.slice(14,22).reduce((a,b)=>a+(b||0),0);

            let hc_h = hc <=16 ? "🟢 Past" : hc <=26 ? "🟡 O'rta" : "🔴 Yuqori";
            let dp_h = dp <=6 ? "🟢 Past" : dp <=12 ? "🟡 O'rta" : "🔴 Yuqori";
            let sy_h = sy >=39 ? "🟢 Yuqori (yaxshi)" : sy >=32 ? "🟡 O'rta" : "🔴 Past (muammo)";

            document.getElementById("question-container").innerHTML = `
                <h2>Test tugadi!</h2>
                <h3>Hissiy charchoq: <b>${hc}/54</b> — ${hc_h}</h3>
                <h3>Depersonalizatsiya: <b>${dp}/30</b> — ${dp_h}</h3>
                <h3>Shaxsiy yutuq: <b>${sy}/48</b> — ${sy_h}</h3>
                <button class="finish-btn" onclick="window.location.href='index.html'">Bosh sahifaga qaytish</button>
            `;
        }

        showQuestion();
    </script>
</body>
</html>
